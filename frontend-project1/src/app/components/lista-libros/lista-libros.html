<div class="contenedor">
  <h1>📚 Mi Biblioteca Digital</h1>
  
  <button mat-raised-button color="primary" routerLink="/nuevo" style="margin-bottom: 20px;">
    + Agregar Nuevo Libro
  </button>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> No. </th>
      <td mat-cell *matCellDef="let libro"> {{libro.id}} </td>
    </ng-container>

    <ng-container matColumnDef="titulo">
      <th mat-header-cell *matHeaderCellDef> Título </th>
      <td mat-cell *matCellDef="let libro"> {{libro.titulo}} </td>
    </ng-container>

    <ng-container matColumnDef="autor">
      <th mat-header-cell *matHeaderCellDef> Autor </th>
      <td mat-cell *matCellDef="let libro"> {{libro.autor}} </td>
    </ng-container>

    <ng-container matColumnDef="anioPublicacion">
      <th mat-header-cell *matHeaderCellDef> Año </th>
      <td mat-cell *matCellDef="let libro"> {{libro.anioPublicacion}} </td>
    </ng-container>

    <ng-container matColumnDef="disponible">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let libro"> 
        {{libro.disponible ? '✅ Disponible' : '❌ Prestado'}} 
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let libro">
        <button mat-button color="primary" [routerLink]="['/editar', libro.id]">Editar</button>
        <button mat-button color="warn" (click)="eliminarLibro(libro.id)">Eliminar</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnasAMostrar"></tr>
    <tr mat-row *matRowDef="let row; columns: columnasAMostrar;"></tr>
  </table>
</div>
